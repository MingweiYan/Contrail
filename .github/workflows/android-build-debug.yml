name: Android Debug Build (Verbose)
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      
      - uses: android-actions/setup-android@v3
      
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      
      - name: Check project structure
        run: |
          echo "=== Project Structure ==="
          ls -la
          echo -e "\n=== Assets Directories ==="
          ls -la assets/ 2>/dev/null || echo "assets directory not found"
          ls -la assets/icons/ 2>/dev/null || echo "assets/icons directory not found"
          ls -la assets/images/ 2>/dev/null || echo "assets/images directory not found"
          echo -e "\n=== pubspec.yaml ==="
          cat pubspec.yaml
      
      - name: Flutter Clean
        run: flutter clean -v
      
      - name: Flutter Pub Get
        run: flutter pub get -v
      
      - name: Flutter Doctor
        run: flutter doctor -v
      
      - name: Build APK (Debug)
        run: flutter build apk --debug -v
      
      - name: Analyze Build Output
        run: |
          echo -e "\n=== Build Directory ==="
          ls -la build/app/outputs/flutter-apk/
          
          APK_PATH="build/app/outputs/flutter-apk/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            echo -e "\n=== APK Size ==="
            du -h "$APK_PATH"
            
            echo -e "\n=== APK Contents ==="
            unzip -l "$APK_PATH"
          fi
