name: Android Release
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-
      - name: Bump version
        run: |
          # 运行版本递增脚本
          NEW_VERSION=$(bash scripts/bump_version.sh)
          # 提交版本号变更
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add pubspec.yaml
          git commit -m "Bump version to $NEW_VERSION"
          git push origin main
      - id: version
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          if [ -z "$RAW" ]; then
            exit 1
          fi
          VERSION_NAME="${RAW%%+*}"
          BUILD_NUMBER="${RAW#*+}"
          TAG_NAME="v${VERSION_NAME}"
          RELEASE_NAME="v${VERSION_NAME}+${BUILD_NUMBER}"
          if git rev-parse -q --verify "refs/tags/${TAG_NAME}" >/dev/null; then
            TAG_NAME="${TAG_NAME}.${GITHUB_RUN_NUMBER}"
            RELEASE_NAME="${RELEASE_NAME}.${GITHUB_RUN_NUMBER}"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV
      - name: Prepare signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p android/app
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || \
             [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || \
             [ -z "$ANDROID_KEY_ALIAS" ] || \
             [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Error: Missing signing secrets"
            echo "Please set ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,"
            echo "ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD in GitHub Secrets"
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          echo "storePassword=$ANDROID_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$ANDROID_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$ANDROID_KEY_ALIAS" >> android/key.properties
          echo "storeFile=release.keystore" >> android/key.properties
      - run: flutter pub get
      - name: Build Fat APK (universal)
        run: flutter build apk --release
      - name: Build Split APKs (per ABI)
        run: flutter build apk --release --split-per-abi
      - name: Rename and prepare APKs
        run: |
          # Rename Fat APK
          FAT_APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          FAT_APK_NAME="Contrail-${VERSION_NAME}-universal.apk"
          FAT_APK_NEW_PATH="build/app/outputs/flutter-apk/$FAT_APK_NAME"
          mv "$FAT_APK_PATH" "$FAT_APK_NEW_PATH"
          
          # Rename Split APKs
          for ABI in arm64-v8a armeabi-v7a x86_64; do
            APK_PATH="build/app/outputs/flutter-apk/app-${ABI}-release.apk"
            APK_NAME="Contrail-${VERSION_NAME}-${ABI}.apk"
            APK_NEW_PATH="build/app/outputs/flutter-apk/$APK_NAME"
            mv "$APK_PATH" "$APK_NEW_PATH"
          done
          
          # List all APKs to upload
          echo "APKS_TO_UPLOAD=$(ls -1 build/app/outputs/flutter-apk/Contrail-*.apk | tr '\n' ' ')" >> $GITHUB_ENV
      - name: List built APKs
        run: |
          echo "=== Built APKs ==="
          ls -lh build/app/outputs/flutter-apk/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: build/app/outputs/flutter-apk/Contrail-*.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
